<!DOCTYPE html>
<html>
<head>
<meta content="600" http-equiv="refresh"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<style>
/* Make the html and body take up the full screen height and remove default margins */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden; /* Prevents scrollbars if the image fits perfectly */
}

/* Use flexbox on the wrapper to perfectly center the blinking container */
.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
}

.blink_img {
  animation: blinker 2s linear infinite;
  height: 100%;
  display: flex;
  align-items: center;
}

/* Force the image to match the screen height while maintaining its proportions */
img {
  display: block;
  height: 100vh; /* 100% of the viewport height */
  width: auto;   /* Maintains aspect ratio automatically */
}

@keyframes blinker {
  0% { opacity: 1; }
  50% { opacity: 0; }
  100% { opacity: 1; }
}
</style>
</head>
<body>
<div class="wrapper">
<span class="blink_img"><img src="https://temahub.maps.arcgis.com/sharing/rest/content/items/cc3710798b01486995e2fdb175e516b8/data"/></span>
</div>
</body>
</html>
