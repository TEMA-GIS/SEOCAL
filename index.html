<!DOCTYPE html>
<html>
<head>
<meta content="600" http-equiv="refresh"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<style>
/* Removes default layout padding and prevents scrolling */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden; 
}
.blink_img {
  animation: blinker 2s linear infinite;
}
/* Force the image to scale nicely into the full viewport */
img {
  display: block;
  width: 100vw;      /* 100% of viewport width */
  height: 100vh;     /* 100% of viewport height */
  object-fit: cover; /* Crops the sides to fill the screen beautifully without warping */
}
@keyframes blinker {
  100% { opacity: 0; }
}
@keyframes blin {
  100% { opacity: 0; }
}
</style>
</head>
<body>
<div class="wrapper">
<span class="blink_img"><img src="https://temahub.maps.arcgis.com/sharing/rest/content/items/cc3710798b01486995e2fdb175e516b8/data"/></span>
</div>
</body>
</html>
